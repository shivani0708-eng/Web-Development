<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
        *{
          margin:0;
          padding:0;
          box-sizing:border-box;
        }
        .container{
           width:500px;
           height:500px;
           background:skyblue;
           display:flex;
           flex-direction:column;
           align-items:center;
           
    }
        .NavBar{
            height:50px;
            width:500px;
            background-color:darkslategray;
            margin:0;

        animation:pulse 2s infinite;
        }  
        @keyframes pulse {
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.1);
    }
    100%{
        transform:scale(1);
    }
}
         .ball{
            width:50px;
            height:50px;
            background-color:darkblue;
            border-radius:50%;
            position:absolute;
            left:10px;

         
            animation: Bounce 1s  ease-in-out infinite ;
        }
        @keyframes Bounce{
            0%{
               transform:translateX(0px) scale(1) ;
                 
            }
            25%{
               transform:translateX(400px) scale(1) ;
            }

            50%{
                transform:translateY(450px) scale(1.5)  ;
            }
            75%{
               transform:translateZ(500px) scale(1) ;
            }
            
            100%{
               transform:translateY(0px) scale(1);
            }

        }
       .pulse-btn{
          padding:10px 20px;
          border:none;
          cursor:pointer;
          transition:transform 0.3s;
        }

        .pulse-btn:hover{
           transform:scale(1.2);
        }
        .card{
          width:200px;
          height:250px;
          perspective:1000px;
          margin:60px; 
          text-align:center;
        }

       .card-inner{
          width:100%;
          height:100%;
          position:relative;
          transform-style:preserve-3d;
        transition:transform 0.8s;
        }

        .card:hover .card-inner{
        transform:rotateY(180deg);
        }

        .card-front,
        .card-back{
            position:absolute;
            width:100%;
            height:100%;
            backface-visibility:hidden;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-front{
            background:rgb(93, 0, 255);
        }

        .card-back{
            background:purple;
            color:white;
            transform:rotateY(180deg);
        }
    </style>
</head>
<body>

<div class="container"> 
     
        <div class="NavBar">
            <button class ="pulse-btn">Home</button>
            <button class="pulse-btn"> Service</button>
            <button class="pulse-btn">Contact</button>
            <button class="pulse-btn">profile</button>
            <button class="pulse-btn">Library</button>
        </div>
        <div class="ball"></div>
        

<div class="card">
    <div class="card-inner">

        <div class="card-front">
            Front Side
        </div>

        <div class="card-back">
            Back Side
        </div>

    </div>
</div>
</div>
</body>
</html>
