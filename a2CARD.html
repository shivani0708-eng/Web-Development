<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD</title>
    <style>
        div {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 10px;
        }

        .card {
            height: 600px;
            width: 500px;
            border: 2px solid blueviolet;
            border-radius: 40px;
            box-shadow: 4px 2px 4px rgb(156, 24, 24);
        }

        .card img {
            width: 80%;
            height: 80%;
            object-fit: cover;
            margin-bottom: 70px;

        }

        .card:hover {
            border-color: blue;
            background-size: cover;
            background-position: center;
            box-shadow: 4px 4px 10px blue;
            background-image: url(https://www.tallengestore.com/cdn/shop/products/Indian_Art_-Modern_Painting_-_Krishna_Dancing_With_Radha_Rani_688617a4-88d9-473b-99e2-d1f8b29d7090.jpg?v=1568961402.jpg);

        }
    </style>
</head>

<body>
    <div class="container">

        <div class="card">
            <img class="img1" src="https://m.media-amazon.com/images/I/81CHQobuplL.jpg " alt=" Radha painting">
            radha
            <h3>Card 1</h3>
        </div>

        <div class="card">
            <img class="img2"
                src="https://w0.peakpx.com/wallpaper/635/344/HD-wallpaper-radha-and-lord-krishna-lord-krishna-radha-painting-art-love-bhakti-devotional-thumbnail.jpg"
                alt="radha krishna ">
            radha krishna
            <h3>Card 2</h3>
        </div>

        <div class="card">
            <img class="img3" src="https://i.pinimg.com/236x/66/a8/e7/66a8e70649d153c50944e5431bdce9f4.jpg"
                alt="Krishna">
            krishna
            <h3>Card 3</h3>
        </div>

    </div>
</body>

</html>
